name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

env:
  COSIGN_YES: 'true'

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'
      - uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v3.0.6'
      - uses: anchore/sbom-action/download-syft@v0
      - name: Set Go version env
        run: echo "GOVERSION=$(go env GOVERSION)" >> "$GITHUB_ENV"
      - name: Load release notes footer
        run: |
          {
            echo "KAHI_RELEASE_FOOTER<<KAHI_EOF"
            cat .goreleaser/release-footer.md
            echo "KAHI_EOF"
          } >> "$GITHUB_ENV"
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  container:
    runs-on: ubuntu-latest
    needs: goreleaser
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v3.0.6'
      - uses: anchore/sbom-action/download-syft@v0
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/kahiteam/kahi
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !contains(github.ref, '-') }}
      - id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/riscv64,linux/ppc64le,linux/s390x
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
      - name: Sign image by digest
        run: cosign sign --yes "ghcr.io/kahiteam/kahi@${{ steps.build.outputs.digest }}"
      - name: Attest SLSA build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ghcr.io/kahiteam/kahi
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
      - name: Generate image SBOM
        run: syft "ghcr.io/kahiteam/kahi@${{ steps.build.outputs.digest }}" -o cyclonedx-json=/tmp/image-sbom.cdx.json
      - name: Attest image SBOM
        run: cosign attest --yes --type cyclonedx --predicate /tmp/image-sbom.cdx.json "ghcr.io/kahiteam/kahi@${{ steps.build.outputs.digest }}"

  verify-signatures:
    runs-on: ubuntu-latest
    needs: [goreleaser, container]
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      IDENTITY: https://github.com/${{ github.repository }}/.github/workflows/release.yml@refs/tags/${{ github.ref_name }}
      ISSUER: https://token.actions.githubusercontent.com
      IMAGE: ghcr.io/kahiteam/kahi@${{ needs.container.outputs.digest }}
    steps:
      - uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v3.0.6'
      - name: Download draft release assets
        run: |
          mkdir -p /tmp/release-assets
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --dir /tmp/release-assets
      - name: Verify blob signatures
        working-directory: /tmp/release-assets
        run: |
          shopt -s nullglob
          sigs=(*.sig)
          if [ ${#sigs[@]} -eq 0 ]; then
            echo "::error::no .sig files found in draft release"
            exit 1
          fi
          for sig in "${sigs[@]}"; do
            blob="${sig%.sig}"
            cert="${blob}.pem"
            if [ ! -f "$blob" ] || [ ! -f "$cert" ]; then
              echo "::error::missing blob or cert for $sig"
              exit 1
            fi
            echo "verifying $blob"
            cosign verify-blob \
              --certificate-identity "$IDENTITY" \
              --certificate-oidc-issuer "$ISSUER" \
              --signature "$sig" \
              --certificate "$cert" \
              "$blob"
          done
      - name: Verify container image signature
        run: |
          cosign verify \
            --certificate-identity "$IDENTITY" \
            --certificate-oidc-issuer "$ISSUER" \
            "$IMAGE"
      - name: Verify container CycloneDX attestation
        run: |
          cosign verify-attestation \
            --type cyclonedx \
            --certificate-identity "$IDENTITY" \
            --certificate-oidc-issuer "$ISSUER" \
            "$IMAGE"
      - name: Verify container SLSA provenance attestation
        run: |
          cosign verify-attestation \
            --type slsaprovenance1 \
            --certificate-identity "$IDENTITY" \
            --certificate-oidc-issuer "$ISSUER" \
            "$IMAGE"
      - name: Promote draft release
        run: gh release edit "${{ github.ref_name }}" --repo "${{ github.repository }}" --draft=false
